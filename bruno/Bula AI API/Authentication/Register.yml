info:
  name: Register
  type: http
  seq: 1
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "vivi1@vivi.com",
        "full_name": "Vi Vicio",
        "password": "Vivivicio1!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/auth/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "full_name": "",
            "password": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "token": {
              "access_token": "",
              "token_type": ""
            },
            "user": {
              "email": "",
              "full_name": "",
              "id": 0,
              "is_active": false
            }
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/auth/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "full_name": "",
            "password": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

docs: |-
  Registers a new user, automatically logs them in, and returns an access token.
  Sets the refresh token in an HttpOnly cookie.
