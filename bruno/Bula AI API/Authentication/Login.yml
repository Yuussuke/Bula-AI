info:
  name: Login
  type: http
  seq: 2
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "vivi1@vivi.com",
        "password": "Vivivicio1!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "token": {
              "access_token": "",
              "token_type": ""
            },
            "user": {
              "email": "",
              "full_name": "",
              "id": 0,
              "is_active": false
            }
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

docs: |-
  Authenticates a user. Returns an access token in JSON and sets a
  refresh token in an HttpOnly cookie.
