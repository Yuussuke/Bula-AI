info:
  name: Get My Profile
  type: http
  seq: 3
  tags:
    - Authentication

http:
  method: GET
  url: "{{baseUrl}}/api/v1/auth/me"
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/auth/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "email": "",
            "id": 0,
            "name": "",
            "role": "user"
          }

docs: Returns the profile of the currently authenticated user.
