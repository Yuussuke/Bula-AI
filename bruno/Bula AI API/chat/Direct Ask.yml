info:
  name: Direct Ask
  type: http
  seq: 1
  tags:
    - chat

http:
  method: POST
  url: "{{baseUrl}}/api/v1/chat/direct-ask"
  body:
    type: json
    data: |-
      {
        "question": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/chat/direct-ask"
      method: POST
      body:
        type: json
        data: |-
          {
            "question": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/chat/direct-ask"
      method: POST
      body:
        type: json
        data: |-
          {
            "question": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }
