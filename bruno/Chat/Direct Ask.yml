info:
  name: direct-ask
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/chat/direct-ask"
  body:
    type: json
    data: |-
      {
        "question": "O que essa bula diz sobre contraindicações?"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
