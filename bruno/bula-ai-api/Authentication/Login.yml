info:
  name: Login
  type: http
  seq: 2
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "samuel@daniel.com",
        "password": "DanielSamuel"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();

        if (data && data.access_token) {

          bru.setEnvVar("token", data.access_token);
          console.log("Token capturado com sucesso!");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "access_token": "",
            "token_type": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

docs: Authenticates a user and returns a JWT access token.
