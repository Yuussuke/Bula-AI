name: bula-ai

# =============================================================================
# SERVICES
# =============================================================================
services:
  # ---------------------------------------------------------------------------
  # Infrastructure: PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bulaai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bulaai}
      POSTGRES_DB: ${POSTGRES_DB:-bulaai}
    ports:
      - "5432:5432"
    volumes:
      # Persist database data between container restarts
      - postgres_data:/var/lib/postgresql/data

  # ---------------------------------------------------------------------------
  # Application: FastAPI backend
  # ---------------------------------------------------------------------------
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
    environment:
      # Connection string used by the backend to reach PostgreSQL
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bulaai}:${POSTGRES_PASSWORD:-bulaai}@postgres:5432/${POSTGRES_DB:-bulaai}

      # Auth / Security
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JSON_LOGS: ${JSON_LOGS:-true}

      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SQL_ECHO: ${SQL_ECHO:-false}

      # LLM (Maritaca)
      MARITACA_API_KEY: ${MARITACA_API_KEY}

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
