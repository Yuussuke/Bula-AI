name: bula-ai

services:
  # PostgreSQL database service
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bulaai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bulaai}
      POSTGRES_DB: ${POSTGRES_DB:-bulaai}
    ports:
      - "5432:5432"
    volumes:
      # Persist database data between container restarts
      - postgres_data:/var/lib/postgresql/data

  # FastAPI backend service
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
    environment:
      # Connection string used by the backend to reach PostgreSQL
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bulaai}:${POSTGRES_PASSWORD:-bulaai}@postgres:5432/${POSTGRES_DB:-bulaai}

volumes:
  postgres_data:
